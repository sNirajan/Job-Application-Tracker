services:
  # Express API
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://tracker:tracker123@postgres:5432/job_tracker
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=change-this-in-production
      - JWT_REFRESH_SECRET=change-this-in-production-too
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Restart if the app crashes
    restart: unless-stopped

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=tracker
      - POSTGRES_PASSWORD=tracker123
      - POSTGRES_DB=job_tracker
    ports:
      - "5433:5432"
    # Store data outside the container so it survives restarts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# Named volume, data persists even if the container is destroyed
volumes:
  postgres_data: